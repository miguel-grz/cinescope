services:
  - type: web
    name: cinescope-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TMDB_API_KEY
        sync: false # set manually in the Render dashboard — never committed
      - key: DATABASE_URL
        fromDatabase:
          name: cinescope-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false # set to your deployed frontend URL, e.g. https://cinescope.vercel.app

databases:
  - name: cinescope-db
    plan: free
